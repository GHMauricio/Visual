<div class="container">
  <h2 style="text-align: center">Lista de Eventos</h2>
  <div>
    <!--tabla-->
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      <!-- Position Column -->
      <ng-container matColumnDef="idEvento">
        <th mat-header-cell *matHeaderCellDef>ID.</th>
        <td mat-cell *matCellDef="let element">{{ element.idEvento }}</td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="idUsuario">
        <th mat-header-cell *matHeaderCellDef>Usuario</th>
        <td mat-cell *matCellDef="let element">{{ element.idUsuario }}</td>
      </ng-container>

      <ng-container matColumnDef="tituloEvento">
        <th mat-header-cell *matHeaderCellDef>Titulo Evento</th>
        <td mat-cell *matCellDef="let element">{{ element.tituloEvento }}</td>
      </ng-container>

      <!-- Symbol Column -->
      <ng-container matColumnDef="fechaInicio">
        <th mat-header-cell *matHeaderCellDef>Fecha Inicio</th>
        <td mat-cell *matCellDef="let element">{{ element.fechaInicio }}</td>
      </ng-container>
      <!-- Symbol Column -->
      <ng-container matColumnDef="fechaFin">
        <th mat-header-cell *matHeaderCellDef>Fecha Fin</th>
        <td mat-cell *matCellDef="let element">{{ element.fechaFin }}</td>
      </ng-container>
      <!-- Symbol Column -->
      <ng-container matColumnDef="tipoEvento">
        <th mat-header-cell *matHeaderCellDef>Tipo Evento</th>
        <td mat-cell *matCellDef="let element">{{ element.tipoEvento }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="warn" (click)="eliminar(element.idEvento)">
            <mat-icon>delete</mat-icon></button
          ><button mat-icon-button color="primary" [routerLink]="['/eventos/edits', element.idEvento]">
            <mat-icon>edit</mat-icon>
        </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</div>
